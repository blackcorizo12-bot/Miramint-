<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miramint Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f5f7fa;
}

.sidebar{
width:250px;
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 0;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.profile{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Miramint</h2>

<a href="#">Dashboard</a>
<a href="#">My Profile</a>
<a href="#">My Business</a>
<a href="#">Bookings</a>
<a href="#">Messages</a>
<a href="#">Reviews</a>
<a href="#">Settings</a>
<a href="#">Logout</a>
</div>

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Customers</h3>
<h1>1,250</h1>
</div>

<div class="card">
<h3>Total Orders</h3>
<h1>870</h1>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h1>₦2.5M</h1>
</div>

<div class="card">
<h3>Reviews</h3>
<h1>245</h1>
</div>

</div>

<div class="profile">
<h2>Owner Profile</h2>
<br>
<p><strong>Name:</strong> <span id="ownerName"></span></p>
<p><strong>Business:</strong> Miramint Services</p>
<p><strong>Email:</strong> <span id="ownerEmail"></span></p>
<p><strong>Status:</strong> Active</p>
</div>

</div>
<script>
const user =
JSON.parse(localStorage.getItem("miramintUser"));

if(user){
document.getElementById("ownerName").textContent = user.name;
document.getElementById("ownerEmail").textContent = user.email;
}
</script>
</body>
</html>
