<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miramint Owner Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f5f7fa;
}

.sidebar{
width:250px;
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:25px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 0;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.section{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Miramint</h2>

<a href="#">Dashboard</a>
<a href="#">My Business</a>
<a href="add-business.html">Add Business</a>
<a href="#">Customers</a>
<a href="#">Bookings</a>
<a href="#">Messages</a>
<a href="#">Reviews</a>
<a href="#">Settings</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<h1>Owner Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Customers</h3>
<h1>0</h1>
</div>

<div class="card">
<h3>Total Bookings</h3>
<h1>0</h1>
</div>

<div class="card">
<h3>Revenue</h3>
<h1>₦0</h1>
</div>

<div class="card">
<h3>Reviews</h3>
<h1>0</h1>
</div>

</div>

<div class="section">
<h2>Business Profile</h2>

<input type="text" placeholder="Business Name">

<input type="text" placeholder="Business Category">

<textarea placeholder="Business Description"></textarea>

<button>Save Business Info</button>
</div>

<div class="section">
<h2>Recent Activity</h2>
<div id="businessInfo"></div>
</div>

</div>
<script>
const businesses =
JSON.parse(localStorage.getItem("miramintBusinesses")) || [];

let output = "";

businesses.forEach(business => {
output += `
<div style="margin-bottom:20px;">
<h3>${business.name}</h3>
<p>Category: ${business.category}</p>
<p>Location: ${business.location}</p>
<p>Phone: ${business.phone}</p>
<p>${business.description}</p>
<hr>
</div>
`;
});

document.getElementById("businessInfo").innerHTML = output;
</script>
</body>
</html>
