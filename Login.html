<!DOCTYPE html>
<html>
<head>
<title>Miramint Login</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f7fa;
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>
<script>
function login(){

const user =
JSON.parse(localStorage.getItem("miramintUser"));

if(!user){
alert("No account found. Please sign up first.");
return;
}

if(user.type === "owner"){
window.location.href = "owner-dashboard.html";
}
else{
window.location.href = "customer-dashboard.html";
}

}
</script>
</body>
</html>
